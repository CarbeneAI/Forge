<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="flame" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="anvil" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#374151;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f2937;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="#0f172a" stroke="#1e293b" stroke-width="4"/>

  <!-- Anvil base -->
  <path d="M 128 340 L 384 340 L 400 380 L 112 380 Z" fill="url(#anvil)" rx="4"/>
  <path d="M 144 300 L 368 300 L 384 340 L 128 340 Z" fill="#4b5563" rx="2"/>

  <!-- Anvil horn (left) -->
  <path d="M 144 300 Q 100 300 80 310 Q 70 316 80 320 L 144 320 Z" fill="#4b5563"/>

  <!-- Anvil face highlight -->
  <rect x="148" y="296" width="216" height="4" rx="2" fill="#6b7280" opacity="0.5"/>

  <!-- Hammer -->
  <g transform="rotate(-35, 280, 200)">
    <!-- Hammer handle -->
    <rect x="270" y="180" width="12" height="140" rx="4" fill="#92400e"/>
    <rect x="272" y="180" width="4" height="140" rx="2" fill="#a16207" opacity="0.4"/>

    <!-- Hammer head -->
    <rect x="248" y="155" width="56" height="32" rx="4" fill="#6b7280"/>
    <rect x="248" y="155" width="56" height="4" rx="2" fill="#9ca3af" opacity="0.5"/>
    <rect x="248" y="183" width="56" height="4" rx="2" fill="#374151" opacity="0.5"/>
  </g>

  <!-- Sparks / forge fire -->
  <g filter="url(#glow)">
    <!-- Main flame -->
    <path d="M 230 280 Q 220 240 240 200 Q 250 170 256 140 Q 262 170 272 200 Q 292 240 282 280 Z" fill="url(#flame)" opacity="0.9"/>
    <!-- Inner flame -->
    <path d="M 240 280 Q 235 250 248 220 Q 254 200 256 180 Q 258 200 264 220 Q 277 250 272 280 Z" fill="#fbbf24" opacity="0.8"/>
    <!-- Flame core -->
    <path d="M 248 280 Q 246 260 252 240 Q 255 230 256 220 Q 257 230 260 240 Q 266 260 264 280 Z" fill="#fef3c7" opacity="0.9"/>
  </g>

  <!-- Spark particles -->
  <circle cx="200" cy="200" r="3" fill="#f97316" opacity="0.8"/>
  <circle cx="310" cy="190" r="2.5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="190" cy="230" r="2" fill="#ef4444" opacity="0.6"/>
  <circle cx="320" cy="220" r="2" fill="#f97316" opacity="0.7"/>
  <circle cx="210" cy="170" r="1.5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="300" cy="165" r="2" fill="#ef4444" opacity="0.6"/>
  <circle cx="185" cy="250" r="1.5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="325" cy="245" r="1.5" fill="#f97316" opacity="0.5"/>

  <!-- Text: FORGE -->
  <text x="256" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="56" fill="white" letter-spacing="12">FORGE</text>

  <!-- Subtle tagline -->
  <text x="256" y="466" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="14" fill="#94a3b8" letter-spacing="4">BY CARBENEAI</text>
</svg>
